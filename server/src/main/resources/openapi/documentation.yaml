openapi: "3.1.0"
info:
  title: Movie Server API
  version: "1.0.0"
  description: |
    Ktor backend for managing a movie catalogue.

    **Authentication:** The server issues its own HMAC256 JWTs.
    Obtain a token via `POST /auth/register` or `POST /auth/login`, then pass it as
    `Authorization: Bearer <access_token>`. Access tokens expire after 1 hour; use
    `POST /auth/refresh` to rotate them without re-authenticating.

    **Roles:**
    - `USER` — default; can read movies and manage their own favorites.
    - `ADMIN` — can create, update, and delete movies.
    - `SUPER_ADMIN` — can manage user roles in addition to all admin capabilities.

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Auth
    description: Registration, login, and token refresh
  - name: Movies
    description: Movie catalogue — read operations are public, writes require admin
  - name: Favorites
    description: Per-user movie favorites (requires authentication)
  - name: Users
    description: User management (requires authentication or super_admin)

security: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: HMAC256 JWT — obtain via `POST /auth/login` or `POST /auth/register`.

  schemas:
    UserRole:
      type: string
      enum:
        - USER
        - ADMIN
        - SUPER_ADMIN

    UserResponse:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'

    Genre:
      type: string
      enum:
        - ACTION
        - COMEDY
        - DRAMA
        - HORROR
        - THRILLER
        - ROMANCE
        - SCI_FI
        - DOCUMENTARY
        - ANIMATION

    Movie:
      type: object
      required: [id, title, genre, created_at, is_favorited]
      properties:
        id:
          type: string
          format: uuid
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        title:
          type: string
          example: "Inception"
        description:
          type: string
          nullable: true
          example: "A mind-bending thriller"
        genre:
          $ref: '#/components/schemas/Genre'
        rating:
          type: number
          format: double
          minimum: 0
          maximum: 10
          nullable: true
          example: 8.8
        photo_url:
          type: string
          nullable: true
          example: "https://<project>.supabase.co/storage/v1/object/public/movies/inception.jpg"
        created_at:
          type: string
          format: date-time
          example: "2026-04-30T10:00:00Z"
        is_favorited:
          type: boolean
          default: false
          description: Present and accurate only when request is authenticated.

    PagedMoviesResponse:
      type: object
      required: [items, page, page_size, total, total_pages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Movie'
        page:
          type: integer
          minimum: 1
          example: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
          example: 20
        total:
          type: integer
          format: int64
          example: 42
        total_pages:
          type: integer
          minimum: 1
          example: 3

    MovieRequest:
      type: object
      required: [title, genre]
      properties:
        title:
          type: string
          example: "Inception"
        description:
          type: string
          nullable: true
          example: "A mind-bending thriller"
        genre:
          $ref: '#/components/schemas/Genre'
        rating:
          type: number
          format: double
          minimum: 0
          maximum: 10
          nullable: true
          example: 8.8
        photo_url:
          type: string
          nullable: true
          example: "https://<project>.supabase.co/storage/v1/object/public/movies/inception.jpg"

    AuthRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          example: "s3cr3t!"

    AuthToken:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          description: HMAC256 JWT — use as Bearer token on authenticated requests. Expires in 1 hour.
        refresh_token:
          type: string
          description: Opaque token valid for 30 days. Rotated on each use.
        token_type:
          type: string
          example: "Bearer"
        expires_in:
          type: integer
          description: Access token TTL in seconds.
          example: 3600

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "Token is not valid or has expired"

paths:
  /auth/register:
    post:
      summary: Register a new user
      description: Creates a new account with `USER` role and returns a token pair.
      operationId: register
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '201':
          description: Account created. Returns auth tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      summary: Sign in
      description: Authenticates with email and password and returns a new token pair.
      operationId: login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Authentication successful. Returns auth tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      summary: Refresh tokens
      description: |
        Exchanges a valid refresh token for a new token pair.
        The submitted refresh token is immediately revoked (rotation).
      operationId: refreshToken
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New token pair issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '401':
          description: Refresh token is invalid, expired, or already revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /movies:
    get:
      summary: List movies
      description: |
        Returns movies, optionally filtered by genre.
        If a valid JWT is provided, each movie includes `is_favorited` reflecting the caller's status.

        **Pagination:** include `page` (1-based) to receive a `PagedMoviesResponse` object instead of a plain array.
        `page_size` defaults to 20 and is clamped to 1–100.
        Omitting `page` returns the full unfiltered array.
      operationId: listMovies
      tags: [Movies]
      security:
        - {}
        - BearerAuth: []
      parameters:
        - name: genre
          in: query
          required: false
          description: Filter by genre (case-sensitive enum value).
          schema:
            $ref: '#/components/schemas/Genre'
        - name: page
          in: query
          required: false
          description: 1-based page number. When present, the response is a `PagedMoviesResponse` object.
          schema:
            type: integer
            minimum: 1
            example: 1
        - name: page_size
          in: query
          required: false
          description: Number of items per page. Clamped to 1–100. Ignored when `page` is absent.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
      responses:
        '200':
          description: |
            Movies list. Schema depends on whether `page` is provided:
            - Without `page`: array of `Movie`
            - With `page`: `PagedMoviesResponse` object
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/Movie'
                  - $ref: '#/components/schemas/PagedMoviesResponse'
        '400':
          description: Invalid genre value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create movie
      description: Creates a new movie entry. Requires a valid JWT and `ADMIN` or `SUPER_ADMIN` role.
      operationId: createMovie
      tags: [Movies]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovieRequest'
      responses:
        '201':
          description: Movie created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
        '401':
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Authenticated user does not have admin privileges.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /movies/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Movie UUID.
        schema:
          type: string
          format: uuid

    get:
      summary: Get movie by ID
      description: |
        Returns a single movie.
        If a valid JWT is provided, includes `is_favorited` for the caller.
      operationId: getMovieById
      tags: [Movies]
      security:
        - {}
        - BearerAuth: []
      responses:
        '200':
          description: Movie found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
        '400':
          description: ID is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Movie not found.

    put:
      summary: Update movie
      description: Replaces all editable fields of a movie. Requires `ADMIN` or `SUPER_ADMIN` role.
      operationId: updateMovie
      tags: [Movies]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovieRequest'
      responses:
        '200':
          description: Movie updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
        '400':
          description: ID is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Authenticated user does not have admin privileges.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Movie not found.

    delete:
      summary: Delete movie
      description: Permanently removes a movie. Requires `ADMIN` or `SUPER_ADMIN` role.
      operationId: deleteMovie
      tags: [Movies]
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Movie deleted successfully.
        '400':
          description: ID is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Authenticated user does not have admin privileges.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Movie not found.

  /movies/{id}/favorite:
    parameters:
      - name: id
        in: path
        required: true
        description: Movie UUID.
        schema:
          type: string
          format: uuid

    post:
      summary: Add to favorites
      description: Marks the movie as favorited for the authenticated user. Idempotent — safe to call if already favorited.
      operationId: addFavorite
      tags: [Favorites]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Movie is now in the user's favorites.
        '400':
          description: ID is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Remove from favorites
      description: Removes the movie from the authenticated user's favorites. No-op if not previously favorited.
      operationId: removeFavorite
      tags: [Favorites]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Movie removed from the user's favorites.
        '400':
          description: ID is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/me:
    get:
      summary: Get current user
      description: Returns the authenticated user's id, email, and role.
      operationId: getMe
      tags: [Users]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User record not found.

  /users:
    get:
      summary: List all users
      description: Returns all registered users. Requires `SUPER_ADMIN` role.
      operationId: listUsers
      tags: [Users]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '401':
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller does not have SUPER_ADMIN privileges.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}/role:
    parameters:
      - name: id
        in: path
        required: true
        description: Target user UUID.
        schema:
          type: string
          format: uuid

    put:
      summary: Update user role
      description: Sets the role of any user. Requires `SUPER_ADMIN` privileges.
      operationId: updateUserRole
      tags: [Users]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: Role updated successfully.
        '400':
          description: ID is not a valid UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller does not have SUPER_ADMIN privileges.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Target user not found.
